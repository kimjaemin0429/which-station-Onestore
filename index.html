<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>여긴 어디역? — 수도권 전철 역 맞추기</title>
<style>
:root{
  --blue:#3182F6; --blue-dark:#1B64DA; --navy:#191F28;
  --gray-1:#F7F8FA; --gray-2:#F2F4F6; --gray-3:#E5E8EB; --gray-5:#8B95A1; --gray-6:#6B7684;
  --red:#F04452; --green:#00A661; --gold:#FFB331;
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%; height:100dvh;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;
  background:var(--gray-1); color:var(--navy);
  display:flex; justify-content:center;
  overflow:hidden;
}
.app{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;background:var(--gray-1);padding-top:env(safe-area-inset-top)}

/* ---------- 공통 ---------- */
.screen{display:none;flex:1;flex-direction:column;padding:20px 16px 24px;overflow-y:auto;min-height:0}
.screen.on{display:flex}
button{font-family:inherit;border:none;cursor:pointer;background:none}
.btn{
  width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:700;
  background:var(--blue);color:#fff;transition:transform .08s,background .15s;
}
.btn:active{transform:scale(.98);background:var(--blue-dark)}
.btn:disabled{background:var(--gray-3);color:var(--gray-5)}
.btn-ghost{background:var(--gray-2);color:var(--navy)}
.btn-ghost:active{background:var(--gray-3)}

/* ---------- 홈 ---------- */
.home-hero{text-align:center;padding:14px 0 10px}
.home-hero .emoji{font-size:44px;display:block;margin-bottom:5px}
.home-hero h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.home-hero p{margin-top:4px;color:var(--gray-6);font-size:13px;line-height:1.4}
.badge{display:inline-block;margin-top:5px;padding:3px 10px;border-radius:999px;background:#EAF2FE;color:var(--blue);font-size:11px;font-weight:700}
.region-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:10px 0}
.region{
  position:relative;padding:10px 8px;border-radius:var(--radius);background:#fff;
  border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.05);
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:border .15s,transform .1s;
}
.region .r-emoji{font-size:22px}
.region .r-name{font-size:15px;font-weight:700}
.region .r-sub{font-size:11px;color:var(--gray-5)}
.region.sel{border-color:var(--blue);background:#F5F9FF}
.region.soon{opacity:.55}
.region.soon .r-sub{color:var(--gray-5)}
.region:active:not(.soon){transform:scale(.97)}
.best-line{text-align:center;font-size:13px;color:var(--gray-6);margin-bottom:8px;min-height:16px}
.best-line b{color:var(--blue)}

/* ---------- 게임 헤더 ---------- */
.g-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.g-quit{font-size:13px;color:var(--gray-6);font-weight:600;padding:6px 10px;border-radius:8px;background:var(--gray-2)}
.g-stats{display:flex;gap:14px;font-size:13px;color:var(--gray-6);font-weight:600}
.g-stats b{color:var(--navy);font-weight:800}
.g-stats .streak-on b{color:var(--gold)}
.prog{height:5px;border-radius:99px;background:var(--gray-3);overflow:hidden;margin-bottom:14px}
.prog>div{height:100%;width:0%;background:var(--blue);border-radius:99px;transition:width .4s ease}

/* ---------- 지도 ---------- */
.map-card{
  position:relative;border-radius:var(--radius);background:#fff;overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
  aspect-ratio:1150.36/1074.59; max-height:60vh; width:100%;
}
.map-viewport{position:absolute;inset:0;overflow:hidden}
.map-world{position:absolute;inset:0}
.map-world svg{width:100%;height:100%;display:block;shape-rendering:geometricPrecision}
.map-status{
  position:absolute;left:50%;top:12px;transform:translateX(-50%);
  padding:7px 14px;border-radius:999px;background:rgba(25,31,40,.78);color:#fff;
  font-size:13px;font-weight:600;backdrop-filter:blur(4px);
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:5;
}
.map-status.on{opacity:1}
.line-badges{
  position:absolute;left:50%;top:46px;transform:translateX(-50%);
  display:flex;gap:5px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:5;
}
.line-badges.on{opacity:1}
.line-chip{
  padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;color:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.25);white-space:nowrap;
}
.map-toast{
  position:absolute;left:50%;bottom:14px;transform:translateX(-50%) translateY(8px);
  padding:10px 18px;border-radius:14px;font-size:15px;font-weight:800;color:#fff;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:5;
  box-shadow:0 4px 14px rgba(0,0,0,.18);
}
.map-toast.ok{background:var(--green)}
.map-toast.no{background:var(--red)}
.map-toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* 마커 (SVG 내부) */
@keyframes pulse{0%{r:3;opacity:.85}70%{r:9;opacity:0}100%{r:9;opacity:0}}
.mk-pulse{fill:none;stroke:#F04452;stroke-width:1.1;animation:pulse 1.5s ease-out infinite}
.mk-dot{fill:#F04452;stroke:#fff;stroke-width:1}
.mk-label{font-size:6px;font-weight:800;fill:#191F28;stroke:#fff;stroke-width:2.4;paint-order:stroke;font-family:inherit}

/* ---------- 선택지 영역 ---------- */
.q-area{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.q-title{font-size:15px;font-weight:700;text-align:center;color:var(--navy);min-height:22px}
.q-title .pt{color:var(--blue)}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-row{display:flex;gap:8px}
.choice-btn{
  flex:1; min-width:0; min-height:56px;
  padding:8px 6px;border-radius:14px;border:1.5px solid var(--gray-3);
  background:#fff;font-size:13px;font-weight:700;color:var(--navy);text-align:center;
  display:flex;align-items:center;justify-content:center;line-height:1.25;
  word-break:keep-all;transition:all .15s;
}
.choice-btn:active{background:var(--gray-2);transform:scale(.98)}
.choice-btn:disabled{pointer-events:none}
.choice-btn.hidden-opt{visibility:hidden}
.choice-btn.sel{border-color:var(--blue);background:#F5F9FF}
.choice-btn.ok{border-color:var(--green);background:#EAFBF3;color:var(--green)}
.choice-btn.no{border-color:var(--red);background:#FEEEEF;color:var(--red)}
.choice-btn.dim{opacity:.4}
.hint-row{display:flex;gap:8px}
.chip.hide{display:none}
.chip{
  flex:1;padding:11px;border-radius:12px;background:#fff;border:1.5px solid var(--gray-3);
  font-size:13px;font-weight:700;color:var(--gray-6);transition:all .15s;
}
.chip:active{background:var(--gray-2)}
.chip:disabled{opacity:.45}
.chip.used{border-color:var(--blue);color:var(--blue);background:#F5F9FF}

/* ---------- 결과 ---------- */
.res-hero{text-align:center;padding:34px 0 10px}
.res-hero .grade-emoji{font-size:56px;display:block;margin-bottom:12px}
.res-hero h2{font-size:24px;font-weight:800;letter-spacing:-.5px}
.res-hero .grade-name{margin-top:6px;font-size:15px;color:var(--blue);font-weight:800}
.res-score{text-align:center;font-size:44px;font-weight:800;margin:6px 0 2px;letter-spacing:-1px}
.res-score small{font-size:16px;color:var(--gray-5);font-weight:600}
.res-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.res-card{background:#fff;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.res-card .v{font-size:19px;font-weight:800}
.res-card .k{font-size:11px;color:var(--gray-5);margin-top:3px;font-weight:600}
.res-list{background:#fff;border-radius:var(--radius);padding:6px 16px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.res-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--gray-2);font-size:14px}
.res-item:last-child{border-bottom:none}
.res-item .st{font-weight:700}
.res-item .pt-ok{color:var(--green);font-weight:800}
.res-item .pt-no{color:var(--red);font-weight:800}
.res-btns{display:flex;flex-direction:column;gap:8px;margin-top:auto;padding-bottom:max(8px,env(safe-area-inset-bottom))}

/* ---------- 스플래시 ---------- */
#splash{
  position:fixed;inset:0;z-index:999;
  background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  transition:opacity .4s ease;
}
#splash.fade{opacity:0;pointer-events:none}
#splash .sp-emoji{font-size:72px;animation:sp-bounce .5s ease-out 3;animation-fill-mode:forwards}
#splash .sp-title{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px}
#splash .sp-sub{font-size:14px;color:rgba(255,255,255,.55);font-weight:500}
@keyframes sp-bounce{0%{transform:scale(1);opacity:1}40%{transform:scale(.85);opacity:.3}100%{transform:scale(1);opacity:1}}
</style>

<script>
'use strict';
/* ══════════════ 데이터 ══════════════ */
const VB = {w:1150.36, h:1074.59};                       // SVG viewBox

const TOTAL_ROUNDS = 10;

/* ══════════════ 유틸 ══════════════ */
const $ = id => document.getElementById(id);
const rand = a => a[Math.floor(Math.random()*a.length)];
const easeOutCubic = t => 1-Math.pow(1-t,3);
const easeInOut = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;

/* ══════════════ 지도 뷰 ══════════════ */
const world = $('world'), viewport = $('viewport');
const svgEl = world.querySelector('svg');
let VP = {w:0,h:0};
function measure(){ const r = viewport.getBoundingClientRect(); VP.w=r.width; VP.h=r.height; }
window.addEventListener('resize', measure);

// 뷰 상태: {s:scale, x,y: 화면 중앙에 올 SVG 좌표}
const view = {cur:null};
function applyView(v){
  view.cur = v;
  const w = VB.w / v.s, h = VB.h / v.s;
  const minX = v.x - w/2, minY = v.y - h/2;
  // 현재 활성 SVG에 viewBox 적용
  const activeSvg = world._activeSvg || svgEl;
  activeSvg.setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
}
let animId = 0;
function animateView(keyframes, done){
  cancelAnimationFrame(animId);
  let seg = 0, t0 = performance.now();
  const from = ()=> seg===0 ? view.cur : keyframes[seg-1];
  function frame(now){
    const kf = keyframes[seg], f = from();
    let p = Math.min((now-t0)/kf.dur, 1);
    const e = (kf.ease||easeInOut)(p);
    applyView({
      s: Math.exp(Math.log(f.s) + (Math.log(kf.s)-Math.log(f.s))*e),  // 로그 보간 = 자연스러운 줌
      x: f.x + (kf.x-f.x)*e,
      y: f.y + (kf.y-f.y)*e
    });
    if(p<1){ animId = requestAnimationFrame(frame); }
    else if(++seg < keyframes.length){ t0 = now; animId = requestAnimationFrame(frame); }
    else done && done();
  }
  animId = requestAnimationFrame(frame);
}

/* 마커 & 라벨 (SVG 내부 주입) */
const SVGNS = 'http://www.w3.org/2000/svg';
let markerG = null;
function showMarker(st){
  removeMarker();
  markerG = document.createElementNS(SVGNS,'g');
  const pulse = document.createElementNS(SVGNS,'circle');
  pulse.setAttribute('cx',st.x); pulse.setAttribute('cy',st.y); pulse.setAttribute('class','mk-pulse');
  const dot = document.createElementNS(SVGNS,'circle');
  dot.setAttribute('cx',st.x); dot.setAttribute('cy',st.y); dot.setAttribute('r','2.4'); dot.setAttribute('class','mk-dot');
  markerG.append(pulse,dot);
  const activeSvg = world._activeSvg || svgEl;
  activeSvg.appendChild(markerG);
}
function revealLabel(st){
  if(!markerG) return;
  const t = document.createElementNS(SVGNS,'text');
  t.setAttribute('x',st.x); t.setAttribute('y',st.y-4.5);
  t.setAttribute('text-anchor','middle'); t.setAttribute('class','mk-label');
  t.textContent = st.n;
  markerG.appendChild(t);
}
function removeMarker(){ if(markerG){ markerG.remove(); markerG = null; } }

  const pool = getStationPool();
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool.slice(0, TOTAL_ROUNDS);
}

function getStationPool(){
  if(currentRegion==='capital'){
    return STATIONS.filter(s=>s.l&&s.l.length>0&&!s.l.some(l=>l==='광주1호선'));
  } else if(currentRegion==='gwangju'){
    return STATIONS.filter(s=>s.l&&s.l.includes('광주1호선'));
  }
  return STATIONS.filter(s=>s.l&&s.l.length>0);
}

function startGame(){
  Object.assign(G,{queue:pickQueue(),round:0,score:0,streak:0,maxStreak:0,noHintCorrect:0,results:[],over:false});
  show('scrGame'); measure();
  applyView({s:1, x:VB.w/2, y:VB.h/2});
  nextRound();
}
function cur(){ return G.queue[G.round]; }

function nextRound(){
  if(G.round >= TOTAL_ROUNDS){ return endGame(); }
  G.hintsUsed = 0; G.busy = true;
  removeMarker();
  const st = cur();

  // HUD
  $('hudRound').textContent = G.round+1;
  $('progBar').style.width = (G.round/TOTAL_ROUNDS*100)+'%';
  updatePot();
  ['btnHint1','btnHint2'].forEach(id=>{ $(id).classList.remove('used'); $(id).disabled=false; });
  $('btnHint2').classList.add('hide');
  $('btnGiveup').disabled = false;
  $('lineBadges').classList.remove('on');
  $('lineBadges').innerHTML = '';
  buildChoices(st);

  // 탐색 애니메이션: 전체 → 배회 → 타겟
  applyView({s:1, x:VB.w/2, y:VB.h/2});
  setStatus('🔍 역을 찾는 중...', true);
  const w1 = { s:2.1, x: VB.w*(0.3+Math.random()*0.4), y: VB.h*(0.3+Math.random()*0.4), dur:650 };
  const w2 = { s:3.8, x: (w1.x+st.x)/2 + (Math.random()-0.5)*120, y: (w1.y+st.y)/2 + (Math.random()-0.5)*120, dur:700 };
  const tgt = { s:10, x:st.x, y:st.y, dur:950, ease:easeOutCubic };
  animateView([w1,w2,tgt], ()=>{
    showMarker(st);
    setStatus('', false);
    showLineBadges(st);
    G.busy = false;
    enableChoices(true);
  });
}

const LINE_COLORS = {
  '1호선':'#0052A4','2호선':'#00A84D','3호선':'#EF7C1C','4호선':'#00A5DE',
  '5호선':'#996CAC','6호선':'#CD7C2F','7호선':'#747F00','8호선':'#E6186C','9호선':'#BDB092',
  '경의중앙선':'#77C4A3','수인분당선':'#F5A200','공항철도':'#0090D2','경춘선':'#0C8E72',
  '신분당선':'#D4003B','우이신설선':'#B0CE18','서해선':'#8FC31F','김포골드라인':'#A17800',
  '용인경전철':'#509F22','의정부경전철':'#FDA600','인천1호선':'#7CA8D5','인천2호선':'#ED8B00',
  '신림선':'#6789CA','GTX-A':'#9A6292','경강선':'#003DA5','광주1호선':'#00A38D'
};
function showLineBadges(st){
  const wrap = $('lineBadges');
  if(!st.l || !st.l.length){ wrap.classList.remove('on'); return; }
  wrap.innerHTML = st.l.map(name=>{
    const c = LINE_COLORS[name] || '#6B7684';
    return `<span class="line-chip" style="background:${c}">${name}</span>`;
  }).join('');
  wrap.classList.add('on');
}

function setStatus(txt, on){
  const el = $('mapStatus');
  if(txt) el.textContent = txt;
  el.classList.toggle('on', !!on);
}
function toast(txt, ok){
  const el = $('mapToast');
  el.textContent = txt;
  el.className = 'map-toast on ' + (ok?'ok':'no');
  clearTimeout(el._t);
  el._t = setTimeout(()=> el.classList.remove('on'), 1400);
}
const TIER_SCORE = [100, 75, 50];   // [힌트0개, 힌트1개, 힌트2개]
function currentTierScore(){ return TIER_SCORE[Math.min(G.hintsUsed, TIER_SCORE.length-1)]; }
function updatePot(){
  $('qTitle').innerHTML = `이 역의 이름은? <span class="pt">${currentTierScore()}점</span>`;
  $('hudScore').textContent = G.score;
  $('hudStreak').textContent = G.streak;
  $('hudStreakWrap').classList.toggle('streak-on', G.streak>=2);
}

/* ══════════════ 객관식 선택지 ══════════════ */
function buildChoices(st){
  // 정답 + 오답 4개 — 같은 지역 풀에서만 뽑기
  const pool = getStationPool().filter(s => s.n !== st.n);
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const seen = new Set([st.n]);
  const wrongs = [];
  for(const s of pool){
    if(wrongs.length>=NUM_CHOICES-1) break;
    if(seen.has(s.n)) continue;
    seen.add(s.n); wrongs.push(s.n);
  }
  const opts = [st.n, ...wrongs];
  for(let i=opts.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }

  G.correctAnswer = st.n;
  G.answered = false;

  const btnHtml = name => `<button class="choice-btn" data-name="${name.replace(/"/g,'&quot;')}">${name}</button>`;
  const wrap = $('choicesWrap');
  wrap.innerHTML =
    `<div class="choice-row">${opts.slice(0,3).map(btnHtml).join('')}</div>` +
    `<div class="choice-row">${opts.slice(3,5).map(btnHtml).join('')}</div>`;
  wrap.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.onclick = ()=> selectChoice(btn);
  });
}
function enableChoices(on){
  $('choicesWrap').querySelectorAll('.choice-btn').forEach(b=> b.disabled = !on);
}

function selectChoice(btn){
  if(G.busy || G.answered) return;
  G.answered = true; G.busy = true;
  enableChoices(false);
  const st = cur();
  const picked = btn.dataset.name;
  const ok = picked === G.correctAnswer;

  if(ok){
    const gained = currentTierScore();
    G.score += gained; G.streak++; G.maxStreak = Math.max(G.maxStreak,G.streak);
    if(G.hintsUsed===0) G.noHintCorrect++;
    G.results.push({n:st.n, pt:gained, ok:true});
    btn.classList.add('ok');
    revealLabel(st);
    toast(`정답! ${st.n} +${gained}점`, true);
    updatePot();
  }else{
    G.streak = 0;
    G.results.push({n:st.n, pt:0, ok:false});
    btn.classList.add('no');
    $('choicesWrap').querySelectorAll('.choice-btn').forEach(b=>{
      if(b.dataset.name===G.correctAnswer) b.classList.add('ok');
      else if(b!==btn) b.classList.add('dim');
    });
    revealLabel(st);
    toast(`오답! 정답은 ${st.n}`, false);
    updatePot();
  }
  setTimeout(()=>{ G.round++; nextRound(); }, ok?1500:1900);
}

function useHint(nth){
  if(G.busy) return;
  const btn = nth===1 ? $('btnHint1') : $('btnHint2');
  if(btn.classList.contains('used')) return;
  const wrongBtns = Array.from($('choicesWrap').querySelectorAll('.choice-btn'))
    .filter(b => b.dataset.name!==G.correctAnswer && !b.classList.contains('hidden-opt'));
  if(!wrongBtns.length) return;
  const target = rand(wrongBtns);
  target.classList.add('hidden-opt');
  target.disabled = true;
  btn.classList.add('used'); btn.disabled = true;
  if(nth===1) $('btnHint2').classList.remove('hide');
  G.hintsUsed++;
  updatePot();
}

function giveUp(){
  if(G.busy || G.answered) return;
  G.answered = true; G.busy = true;
  enableChoices(false);
  const st = cur();
  G.streak = 0;
  G.results.push({n:st.n, pt:0, ok:false});
  $('choicesWrap').querySelectorAll('.choice-btn').forEach(b=>{
    if(b.dataset.name===G.correctAnswer) b.classList.add('ok');
    else b.classList.add('dim');
  });
  revealLabel(st);
  toast(`정답은 ${st.n}`, false);
  updatePot();
  setTimeout(()=>{ G.round++; nextRound(); }, 1800);
}

/* ══════════════ 결과 ══════════════ */
const GRADES = [
  [950,'🚄','전국 철도 마스터'],
  [800,'🚈','수도권 그랜드슬램'],
  [600,'🎫','환승의 달인'],
  [400,'💳','정기권 고인물'],
  [200,'🚶','성실한 통근러'],
  [0,'🧭','아직은 뚜벅이']
];
function endGame(){
  G.over = true;
  $('progBar').style.width = '100%';
  const correct = G.results.filter(r=>r.ok).length;
  const g = GRADES.find(g=>G.score>=g[0]);
  $('gradeEmoji').textContent = g[1];
  $('gradeName').textContent = g[2] + (G.score>best&&best>0?' · 신기록! 🎉':'');
  $('finalScore').textContent = G.score;
  $('rcCorrect').textContent = correct+'/'+TOTAL_ROUNDS;
  $('rcStreak').textContent = G.maxStreak;
  $('rcNohint').textContent = G.noHintCorrect;
  $('resList').innerHTML = G.results.map(r=>
    `<div class="res-item"><span class="st">${r.ok?'✅':'❌'} ${r.n}</span><span class="${r.ok?'pt-ok':'pt-no'}">${r.ok?'+'+r.pt:'0'}점</span></div>`
  ).join('');
  if(G.score>best){ best = G.score; try{ localStorage.setItem('subwayquiz_best', String(best)); }catch(e){} }
  show('scrResult');
}

/* ══════════════ 이벤트 ══════════════ */
$('regionGrid').addEventListener('click', e=>{
  const r = e.target.closest('.region');
  if(!r || r.classList.contains('soon')) return;
  document.querySelectorAll('.region').forEach(x=>x.classList.remove('sel'));
  r.classList.add('sel');
  switchRegion(r.dataset.region);
});
$('btnStart').onclick = startGame;
$('btnRetry').onclick = startGame;
$('btnHome').onclick = ()=>{ updateBestLine(); show('scrHome'); };
$('btnQuit').onclick = ()=>{ cancelAnimationFrame(animId); removeMarker(); updateBestLine(); show('scrHome'); };
$('btnHint1').onclick = ()=>useHint(1);
$('btnHint2').onclick = ()=>useHint(2);
$('btnGiveup').onclick = giveUp;

// 스플래시 페이드아웃
setTimeout(()=>{
  const sp = document.getElementById('splash');
  sp.classList.add('fade');
  setTimeout(()=> sp.remove(), 420);
}, 1800);

// 초기 지역 설정
switchRegion('capital');
updateBestLine();
measure();
</script>
